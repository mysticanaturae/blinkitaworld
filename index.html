<script>
window.UNIVERSE = {
  mood: "neutral",
  intensity: 0.5
};

function setMood(mood){
  window.UNIVERSE.mood = mood;
  document.body.setAttribute("data-mood", mood);
}

/* INTERAKCIJE */
const interactiveElements = document.querySelectorAll(".world, .card, a");

let interactionScore = 0;

function updateMood(){
  if(interactionScore < 3) setMood("calm");
  else if(interactionScore < 7) setMood("active");
  else if(interactionScore < 12) setMood("deep");
  else setMood("mystical");
}

interactiveElements.forEach(el=>{
  el.addEventListener("mouseenter", ()=>{
    interactionScore += 1;
    updateMood();
  });

  el.addEventListener("click", ()=>{
    interactionScore += 2;
    updateMood();
  });
});

/* SCROLL ANIMACIJE */
const sections = document.querySelectorAll("section");

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("in-view");

      const ripple = document.createElement("div");
      ripple.className = "ripple active";
      document.body.appendChild(ripple);

      setTimeout(()=>ripple.remove(), 800);
    }
  });
},{threshold:0.25});

sections.forEach(s=>observer.observe(s));

/* AUDIO */
const audio = document.querySelector("#ambience");

window.addEventListener("click", () => {
  if(audio){
    audio.volume = 0.3;
    audio.play().catch(()=>{});
  }
}, { once:true });

/* PORTAL TRANSITION */
const overlay = document.createElement("div");
overlay.className = "portal-overlay";
document.body.appendChild(overlay);

document.querySelectorAll("a").forEach(link=>{
  link.addEventListener("click", (e)=>{
    const href = link.getAttribute("href");

    if(!href || !href.includes(".html")) return;

    e.preventDefault();

    overlay.classList.add("active");

    document.body.style.transform = "scale(1.02)";
    document.body.style.transition = "0.6s ease";

    setTimeout(()=>{
      window.location.href = href;
    }, 600);
  });
});
</script>
</body>
</html>
